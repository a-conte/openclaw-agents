name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for secrets
        run: |
          echo "Scanning for leaked secrets..."
          FOUND=0

          # OpenAI keys
          if grep -rn 'sk-proj-[A-Za-z0-9_-]\{20,\}' --include='*.md' --include='*.json' --include='*.js' --include='*.py' --include='*.sh' --include='*.yml' .; then
            echo "::error::OpenAI API key detected!"
            FOUND=1
          fi

          # Google/Gemini keys
          if grep -rn 'AIzaSy[A-Za-z0-9_-]\{30,\}' --include='*.md' --include='*.json' --include='*.js' --include='*.py' --include='*.sh' --include='*.yml' .; then
            echo "::error::Google/Gemini API key detected!"
            FOUND=1
          fi

          # GitHub tokens
          if grep -rn 'gh[ps]_[A-Za-z0-9_]\{36,\}' --include='*.md' --include='*.json' --include='*.js' --include='*.py' --include='*.sh' --include='*.yml' .; then
            echo "::error::GitHub token detected!"
            FOUND=1
          fi

          # Telegram bot tokens
          if grep -rn '[0-9]\{8,10\}:[A-Za-z0-9_-]\{35\}' --include='*.md' --include='*.json' --include='*.js' --include='*.py' --include='*.sh' --include='*.yml' .; then
            echo "::error::Telegram bot token detected!"
            FOUND=1
          fi

          # Slack tokens
          if grep -rn 'xox[bpars]-[A-Za-z0-9-]\{10,\}' --include='*.md' --include='*.json' --include='*.js' --include='*.py' --include='*.sh' --include='*.yml' .; then
            echo "::error::Slack token detected!"
            FOUND=1
          fi

          # Generic long hex secrets (64+ chars, likely tokens)
          if grep -rn '"[a-f0-9]\{64,\}"' --include='*.json' --include='*.yml' .; then
            echo "::error::Possible hex token detected!"
            FOUND=1
          fi

          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "FAILED: Secrets detected in commit. Remove them before pushing."
            exit 1
          fi

          echo "No secrets found."
